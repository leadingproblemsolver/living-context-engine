      to localStorage. Sign-out intentionally leaves that workspace visible in the browser.
    current_state: No dirty-state detection, merge choice, account-scoped local key, or shared-device cleanup.
    required_state: Account-scoped local state, explicit local/cloud conflict resolution, and clear-on-sign-out option.
    affected_user: Returning operator or shared-device user
    trigger: Sign-in with existing cloud data or account switching
    user_consequence: Unsaved local policy may be lost; another browser user may see prior constraints.
    system_consequence: State integrity and local privacy failures.
    evidence:
      - src/routes/index.tsx:235-288
      - src/routes/index.tsx:317-321
