    dependency_depth: 4
    founder_attention_cost: 2
    implementation_complexity: 3
    estimated_value: 5
    stage_necessity: 5
    closure:
      Namespace local data by user, preserve anonymous draft separately, detect divergence, and require choose/merge
      before overwrite.
    acceptance:
      A test with divergent local and cloud data preserves both until the user explicitly resolves the conflict; sign-out
      can clear account data.
    owner: frontend
    execution_class: code+ui+test
    human_gate: Choose default conflict policy.
    risk_priority: 60
    closure_leverage: 12.0
    normalized_closure_leverage: 24.0
