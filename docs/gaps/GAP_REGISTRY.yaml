  - id: DG-G002
    title: Evaluation can overwrite the canonical guardrail policy
    gap_type: deterministic_logic
    failure_class: fragile
    priority: P0
    description:
      The evaluate function accepts a complete client-supplied workspace and calls save_guardrail_set before judgment.
      A stale, tampered, or integration-supplied payload can replace newer user-approved rules.
    current_state: Evaluation and policy mutation share one endpoint and trust the authenticated caller's policy snapshot.
    required_state:
      Evaluation loads the canonical set server-side by set_id and expected_version; policy changes occur only
      through explicit save/approve operations.
    affected_user: Operator and administrator
    trigger: Stale browser, retry, integration, or malicious authenticated request
    user_consequence: A verdict may be produced against silently changed constraints.
    system_consequence: Source-of-truth integrity and auditability are compromised.
    evidence:
      - supabase/functions/evaluate/index.ts:258-313
      - src/routes/index.tsx:482-492
      - schema.sql:303-356
    status: observed
    confidence: 99
    severity: 5
    frequency: 3
    probability: 4
    detectability: 2
    reversibility: 3
    dependency_depth: 5
    founder_attention_cost: 2
    implementation_complexity: 3
    estimated_value: 5
    stage_necessity: 5
    closure:
      Make evaluate accept set_id, input, expected_policy_version, and idempotency_key; load rules from DB; reject stale
      versions with 409.
    acceptance:
      Submitting altered or stale client guardrails never changes stored policy and never evaluates without the current
      approved version.
    owner: backend
    execution_class: code+schema
    human_gate: None after policy contract approval.
    risk_priority: 80
    closure_leverage: 15.0
    normalized_closure_leverage: 30.0
    execution_priority: 73.8
  - id: DG-G003
    title: Policy refresh and evaluation audit are not atomic
    gap_type: orchestration
    failure_class: fragile
    priority: P0
    description:
      The function commits save_guardrail_set, then separately calls the model and inserts the evaluation. Failure
      after the save can leave a changed policy with no matching audit, while API docs call the operation transactional.
    current_state: Multiple network/database operations without one post-model transaction or compensating state.
    required_state:
      After AI returns, one database RPC atomically validates policy version and stores the evaluation/events;
      evaluation must not mutate policy.
    affected_user: Operator, integrator, administrator
    trigger: Provider failure, DB insert failure, timeout, or function termination
    user_consequence: The current rules may change even though the check appears to have failed.
    system_consequence: Partial writes and misleading audit claims.
    evidence:
      - supabase/functions/evaluate/index.ts:286-313
      - supabase/functions/evaluate/index.ts:438-460
      - docs/API.md:90
    status: observed
    confidence: 99
    severity: 5
    frequency: 2
    probability: 3
    detectability: 3
    reversibility: 3
    dependency_depth: 5
    founder_attention_cost: 2
    implementation_complexity: 3
    estimated_value: 5
    stage_necessity: 5
    closure:
      Separate policy save from evaluation; add atomic record_evaluation RPC for evaluation, findings, events, idempotency,
      and policy-version check.
    acceptance:
      Injected failure at each persistence step leaves either the complete evaluation transaction or no evaluation-side
      mutation.
    owner: backend/database
    execution_class: code+schema+test
    human_gate: None.
    risk_priority: 45
    closure_leverage: 10.0
    normalized_closure_leverage: 20.0
    execution_priority: 56.2
