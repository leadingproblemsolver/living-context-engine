metadata:
  system: DriftGuard
  scan_date: "2026-07-09"
  target_stage: credible external pilot
  current_stage: code-validated internal demo / staging candidate
  compiler: Sociotechnical Gap-Closure & Operational-Readiness Compiler
  assessment_basis:
    - uploaded repository source
    - successful npm ci
    - successful npm run validate
    - successful npm run smoke:worker
    - static code/schema/document review
    - LLM simulations labeled simulated
  scoring:
    risk_priority: severity * probability * (6 - detectability)
    closure_leverage: (estimated_value * frequency * dependency_depth) / (implementation_complexity + founder_attention_cost)
    execution_priority: 0.40*risk_priority + 0.35*normalized_closure_leverage + 0.25*(stage_necessity*25)
